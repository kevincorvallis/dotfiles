# Espanso starter config — Kevin Lee @ Paramount
# Triggers prefixed with ; to avoid accidental expansion

matches:
  # ── Identity ──────────────────────────────────
  - trigger: ";name"
    replace: "Kevin Lee"

  - trigger: ";kemail"
    replace: "kevin.lee1@paramount.com"

  - trigger: ";pemail"
    replace: "kevincorvallis@gmail.com"

  - trigger: ";bemail"
    replace: "kevin@pookieb.com"

  - trigger: ";phone"
    word: true
    replace: "(555) 555-5555"

  - trigger: ";phoneplain"
    replace: "5555555555"

  - trigger: ";addr1"
    replace: "123 Main St"

  - trigger: ";addr2"
    replace: "Apt 1"

  - trigger: ";city"
    replace: "Los Angeles"

  - trigger: ";state"
    replace: "CA"

  - trigger: ";zip"
    replace: "00000"

  - trigger: ";country"
    replace: "United States"

  - trigger: ";addr"
    word: true
    replace: |
      123 Main St Apt 1
      Los Angeles, CA 00000

  - trigger: ";dob"
    replace: "<FILL date of birth, e.g. 1990-01-15>"

  - trigger: ";gh"
    word: true
    replace: "https://github.com/kevincorvallis"

  - trigger: ";li"
    replace: "https://www.linkedin.com/in/klee0813"

  - trigger: ";cal"
    replace: "https://calendar.google.com/calendar/appointments/schedules/AcZssZ0lsiOVD3Cv9SR7O0Pp8y2PILR4zYaKCvaZ5zirsYavh0Mkos01gQ77h_Pfg4XGFJFX58-hjXpG?gv=true"

  - trigger: ";site"
    replace: "https://klee.page"

  # ── Dates & Time ──────────────────────────────
  - trigger: ";today"
    replace: "{{date}}"
    vars:
      - name: date
        type: date
        params:
          format: "%Y-%m-%d"

  - trigger: ";now"
    replace: "{{date}}"
    vars:
      - name: date
        type: date
        params:
          format: "%Y-%m-%d %H:%M"

  - trigger: ";iso"
    replace: "{{date}}"
    vars:
      - name: date
        type: date
        params:
          format: "%Y-%m-%dT%H:%M:%S%z"

  # ── Jira / Work ───────────────────────────────
  - trigger: ";jira"
    replace: "https://paramount.atlassian.net/browse/AMLG-$|$"

  - trigger: ";amlg"
    replace: "AMLG-$|$"

  - trigger: ";pr"
    word: true
    replace: "https://github.com/cbsiamlg/$|$"

  - trigger: ";prsplice"
    replace: "https://github.com/cbsiamlg/splice/pull/$|$"

  - trigger: ";prarch"
    replace: "https://github.com/cbsiamlg/archipelago/pull/$|$"

  - trigger: ";prperi"
    replace: "https://github.com/cbsiamlg/periscope/pull/$|$"

  # ── Obsidian ──────────────────────────────────
  - trigger: ";fm"
    replace: |
      ---
      title: $|$
      date: {{date}}
      tags: [paramount]
      type: reference
      ---
    vars:
      - name: date
        type: date
        params:
          format: "%Y-%m-%d"

  - trigger: ";task"
    replace: "- [ ] "

  - trigger: ";done"
    replace: "- [x] "

  - trigger: ";wip"
    replace: "- [/] "

  - trigger: ";cancel"
    replace: "- [-] "

  # ── Code Snippets ─────────────────────────────
  - trigger: ";ifmain"
    replace: |
      if __name__ == "__main__":
          $|$

  - trigger: ";pdb"
    replace: "import pdb; pdb.set_trace()"

  - trigger: ";bpdb"
    replace: "breakpoint()"
